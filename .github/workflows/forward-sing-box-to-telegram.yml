name: Forward sing-box builds to Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll upstream build and push files
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOURCE_ARTIFACT_TOKEN: ${{ secrets.SOURCE_ARTIFACT_TOKEN }}
          SOURCE_OWNER: yelnoo
          SOURCE_REPO: sing-box
          SOURCE_WORKFLOW_FILE: build.yml
          MONITORED_BRANCHES: stable,unstable
          STATE_FILE: state/state.json
          BOOTSTRAP_MODE: latest-only
          ARTIFACT_DOWNLOAD_MODE: nightly-link
          NIGHTLY_LINK_BASE: https://nightly.link
        run: python scripts/forward_sing_box_to_telegram.py

      - name: Commit state
        run: |
          if git diff --quiet -- state/state.json; then
            echo "No state change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/state.json
          git commit -m "chore: update sing-box forwarder state"
          git push
